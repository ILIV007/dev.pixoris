name = "pixoris-api"
main = "src/index.js"
compatibility_date = "2026-06-13"

[[d1_databases]]
binding = "DB"
database_name = "pixoris-db"
database_id = "YOUR_D1_DATABASE_ID"

[vars]
JWT_SECRET = "pixoris-secret-key-change-in-production"
GITHUB_TOKEN = "YOUR_GITHUB_PAT_TOKEN"
GITHUB_REPO = "ILIV007/Pixoris"
GITHUB_BRANCH = "main"
